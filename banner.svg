<svg width="1200" height="300"
viewBox="0 0 1200 300"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">

<stop offset="0%" stop-color="#1D4ED8"/>
<stop offset="35%" stop-color="#7C3AED"/>
<stop offset="70%" stop-color="#EC4899"/>
<stop offset="100%" stop-color="#F97316"/>

</linearGradient>

<linearGradient id="text">

<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#FFE082"/>

</linearGradient>

</defs>

<!-- fundo -->

<rect width="1200" height="300" fill="url(#bg)"/>

<!-- linhas decorativas -->

<g stroke="white" opacity=".08">

<path d="M0 40 H1200"/>
<path d="M0 90 H1200"/>
<path d="M0 140 H1200"/>
<path d="M0 190 H1200"/>
<path d="M0 240 H1200"/>

</g>

<!-- partículas -->

<g fill="white">

<circle cx="100" cy="60" r="2">
<animate attributeName="opacity"
values="0;1;0"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="220" cy="230" r="3">
<animate attributeName="opacity"
values="1;0;1"
dur="5s"
repeatCount="indefinite"/>
</circle>

<circle cx="450" cy="90" r="2">
<animate attributeName="opacity"
values="0;1;0"
dur="4s"
repeatCount="indefinite"/>
</circle>

<circle cx="1100" cy="80" r="2">
<animate attributeName="opacity"
values="1;0;1"
dur="6s"
repeatCount="indefinite"/>
</circle>

</g>

<!-- bloco esquerdo -->

<g>

<text
x="80"
y="120"
font-size="72"
font-family="Segoe UI"
font-weight="700"
fill="url(#text)">

Bárbara Gund

</text>

<text
x="80"
y="185"
font-size="30"
font-family="Segoe UI"
fill="#ffffff"
font-weight="700">

TÉCNICO DE TI

</text>

<text
x="80"
y="225"
font-size="22"
font-family="Segoe UI"
fill="#FDE68A">

Técnica em Informática • Senac RS

</text>

</g>

<!-- cubo -->

<g transform="translate(930 150)">

<animateTransform
attributeName="transform"
type="rotate"
from="0"
to="360"
dur="12s"
repeatCount="indefinite"
additive="sum"/>

<!-- frente -->

<rect
x="-45"
y="-45"
width="90"
height="90"
fill="none"
stroke="#ffffff"
stroke-width="3"/>

<!-- trás -->

<rect
x="-20"
y="-70"
width="90"
height="90"
fill="none"
stroke="#FFE082"
stroke-width="3"/>

<!-- conexões -->

<line x1="-45" y1="-45" x2="-20" y2="-70" stroke="white" stroke-width="3"/>
<line x1="45" y1="-45" x2="70" y2="-70" stroke="white" stroke-width="3"/>
<line x1="-45" y1="45" x2="-20" y2="20" stroke="white" stroke-width="3"/>
<line x1="45" y1="45" x2="70" y2="20" stroke="white" stroke-width="3"/>

</g>

</svg>
