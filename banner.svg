<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14163B"/>
      <stop offset="55%" stop-color="#5B3A8E"/>
      <stop offset="100%" stop-color="#FF7A59"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE3B3"/>
    </linearGradient>
    <clipPath id="line1clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="330" dur="1.2s" begin="0.3s;term.end+7.8s" fill="freeze" id="l1"/>
      </rect>
    </clipPath>
    <clipPath id="line2clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="290" dur="1.1s" begin="l1.end+0.4s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="line3clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="360" dur="1.3s" begin="l1.end+2s" fill="freeze" id="l3"/>
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- circuit-board decoration, top right -->
  <g stroke="#2EC4B6" stroke-width="2" fill="none" opacity="0.35">
    <path d="M 980 30 H 1060 V 70 H 1140"/>
    <path d="M 1020 30 V 10 H 1170"/>
    <path d="M 900 20 H 940 V 55"/>
  </g>
  <g fill="#FFC857" opacity="0.55">
    <circle cx="980" cy="30" r="4"/>
    <circle cx="1060" cy="70" r="4"/>
    <circle cx="1140" cy="70" r="4"/>
    <circle cx="1170" cy="10" r="4"/>
    <circle cx="940" cy="55" r="4"/>
  </g>

  <!-- circuit-board decoration, bottom left -->
  <g stroke="#2EC4B6" stroke-width="2" fill="none" opacity="0.3">
    <path d="M 40 270 H 110 V 250 H 170"/>
    <path d="M 20 230 V 260 H 60"/>
  </g>
  <g fill="#FF7A59" opacity="0.5">
    <circle cx="40" cy="270" r="4"/>
    <circle cx="170" cy="250" r="4"/>
    <circle cx="20" cy="230" r="4"/>
  </g>

  <!-- solder-point texture along the bottom edge -->
  <g fill="#FFFFFF" opacity="0.12">
    <circle cx="30" cy="290" r="2"/>
    <circle cx="70" cy="290" r="2"/>
    <circle cx="110" cy="290" r="2"/>
    <circle cx="150" cy="290" r="2"/>
    <circle cx="190" cy="290" r="2"/>
    <circle cx="1010" cy="290" r="2"/>
    <circle cx="1050" cy="290" r="2"/>
    <circle cx="1090" cy="290" r="2"/>
    <circle cx="1130" cy="290" r="2"/>
    <circle cx="1170" cy="290" r="2"/>
  </g>

  <!-- terminal window -->
  <g id="term">
    <rect x="60" y="60" width="560" height="180" rx="14" fill="#0F1130" fill-opacity="0.55" stroke="#2EC4B6" stroke-opacity="0.55" stroke-width="1.5"/>
    <!-- title bar -->
    <rect x="60" y="60" width="560" height="30" rx="14" fill="#0B0D26" fill-opacity="0.6"/>
    <rect x="60" y="76" width="560" height="14" fill="#0B0D26" fill-opacity="0.6"/>
    <circle cx="84" cy="75" r="6" fill="#FF5F57"/>
    <circle cx="104" cy="75" r="6" fill="#FEBC2E"/>
    <circle cx="124" cy="75" r="6" fill="#28C840"/>
    <text x="360" y="80" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#C9C4E3">barbara@github</text>

    <!-- terminal lines -->
    <g font-family="Consolas, 'Courier New', monospace" font-size="18">
      <g clip-path="url(#line1clip)">
        <text x="86" y="128" fill="#FFC857">$<tspan fill="#FFFFFF" dx="8">whoami</tspan></text>
      </g>
      <g clip-path="url(#line2clip)">
        <text x="86" y="160" fill="#2EC4B6">›<tspan fill="#FFFFFF" dx="8">Bárbara Gund </tspan></text>
      </g>
      <g clip-path="url(#line3clip)">
        <text x="86" y="192" fill="#2EC4B6">›<tspan fill="#FFFFFF" dx="8">Técnico de TI</tspan></text>
      </g>
    </g>

    <!-- blinking cursor -->
    <rect x="86" y="200" width="10" height="18" fill="#FFC857">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1s" begin="l3.end" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- name block -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="680" y="140" font-size="36" font-weight="700" fill="url(#nameGrad)">Bárbara Gund</text>
    <text x="680" y="215" font-size="17" font-weight="600" fill="#FFC857" letter-spacing="0.5">TÉCNICO DE TI</text>
    <text x="680" y="240" font-size="14" fill="#E8E4F3">Técnica em Informática · Senac RS</text>
  </g>
</svg>
